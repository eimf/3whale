# OrdersForIncomeV1 — incremental sync via cursor pagination.
# Single source of truth: docs/metrics/income_v1_contract.md
#
# Field mapping (shopMoney only; no FX; never mix currencies):
#   lineItemsSubtotal     <- currentSubtotalPriceSet.shopMoney   (net of discounts in v1)
#   shippingAmount        <- currentShippingPriceSet.shopMoney
#   taxAmount              <- currentTotalTaxSet.shopMoney       (reported component; excluded from income)
#   discountAmount         <- currentTotalDiscountsSet.shopMoney (breakdown/reconciliation only; do not subtract again)
#   refund.amount         <- refund.totalRefundedSet.shopMoney

query OrdersForIncomeV1($first: Int!, $after: String, $query: String) {
    orders(first: $first, after: $after, query: $query, sortKey: PROCESSED_AT) {
        pageInfo {
            hasNextPage
            endCursor
        }
        nodes {
            id
            name
            createdAt
            processedAt
            updatedAt
            cancelledAt
            test
            sourceName
            displayFinancialStatus
            tags
            app {
                id
                name
            }
            currentSubtotalPriceSet {
                shopMoney {
                    amount
                    currencyCode
                }
            }
            subtotalPriceSet {
                shopMoney {
                    amount
                    currencyCode
                }
            }
            currentShippingPriceSet {
                shopMoney {
                    amount
                    currencyCode
                }
            }
            totalShippingPriceSet {
                shopMoney {
                    amount
                    currencyCode
                }
            }
            currentTotalTaxSet {
                shopMoney {
                    amount
                    currencyCode
                }
            }
            totalTaxSet {
                shopMoney {
                    amount
                    currencyCode
                }
            }
            currentTotalDiscountsSet {
                shopMoney {
                    amount
                    currencyCode
                }
            }
            totalDiscountsSet {
                shopMoney {
                    amount
                    currencyCode
                }
            }
            refunds(first: 50) {
                id
                createdAt
                totalRefundedSet {
                    shopMoney {
                        amount
                        currencyCode
                    }
                }
                refundLineItems(first: 100) {
                    edges {
                        node {
                            quantity
                            subtotalSet {
                                shopMoney {
                                    amount
                                    currencyCode
                                }
                            }
                            totalTaxSet {
                                shopMoney {
                                    amount
                                    currencyCode
                                }
                            }
                            lineItem {
                                id
                                quantity
                                originalTotalSet {
                                    shopMoney {
                                        amount
                                        currencyCode
                                    }
                                }
                            }
                        }
                    }
                }
                refundShippingLines(first: 20) {
                    edges {
                        node {
                            subtotalAmountSet {
                                shopMoney {
                                    amount
                                    currencyCode
                                }
                            }
                            taxAmountSet {
                                shopMoney {
                                    amount
                                    currencyCode
                                }
                            }
                        }
                    }
                }
                orderAdjustments(first: 20) {
                    edges {
                        node {
                            amountSet {
                                shopMoney {
                                    amount
                                    currencyCode
                                }
                            }
                            taxAmountSet {
                                shopMoney {
                                    amount
                                    currencyCode
                                }
                            }
                        }
                    }
                }
                transactions(first: 20) {
                    edges {
                        node {
                            id
                            kind
                            status
                            amountSet {
                                shopMoney {
                                    amount
                                    currencyCode
                                }
                            }
                        }
                    }
                }
                duties {
                    amountSet {
                        shopMoney {
                            amount
                            currencyCode
                        }
                    }
                }
            }
        }
    }
}
